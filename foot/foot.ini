[main]
font=Iosevka Term Light:size=10
dpi-aware=yes
pad=10x10

[tweak]
font-monospace-warn=no

[colors-dark]
alpha=0.95
background=0b0f14
foreground=c9d1d9

# Normal colors
regular0=161b22
regular1=ff7b72
regular2=3fb950
regular3=d29922
regular4=58a6ff
regular5=bc8cff
regular6=39c5cf
regular7=b1bac4

# Bright colors
bright0=30363d
bright1=ffa198
bright2=56d364
bright3=e3b341
bright4=79c0ff
bright5=d2a8ff
bright6=56d4dd
bright7=f0f6fc

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000

[mouse]
hide-when-typing=yes
